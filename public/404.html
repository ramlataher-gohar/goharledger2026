<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages: github.com/rafgraph/spa-github-pages
      // GitHub Pages serves this for any unknown path (i.e. any in-app route
      // loaded directly or refreshed). It re-encodes the path into a query
      // string and redirects to index.html, which decodes it back so React
      // Router sees the original route.
      var pathSegmentsToKeep = 1; // keep "/goharledger2026"

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
